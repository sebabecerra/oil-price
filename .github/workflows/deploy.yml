name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            historical-real-oil-price/package-lock.json
            rally-oil-price/package-lock.json

      - name: Install dependencies
        working-directory: ./historical-real-oil-price
        run: npm ci

      - name: Install dependencies (g2)
        working-directory: ./rally-oil-price
        run: npm ci

      - name: Build data
        working-directory: ./historical-real-oil-price
        run: npm run build:data

      - name: Build data (g2)
        working-directory: ./rally-oil-price
        run: npm run build:data

      - name: Build app
        working-directory: ./historical-real-oil-price
        run: npm run build

      - name: Build app (g2)
        working-directory: ./rally-oil-price
        run: npm run build

      - name: Assemble site
        run: |
          rm -rf site
          mkdir -p site/historical-real-oil-price site/rally-oil-price
          cp index.html site/index.html
          cp -R historical-real-oil-price/dist/. site/historical-real-oil-price/
          cp -R rally-oil-price/dist/. site/rally-oil-price/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
